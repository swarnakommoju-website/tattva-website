<section class="screens">

  <img
    class="bg-image"
    [src]="slides[currentSlide].image"
    alt="Background">

  <div class="overlay"></div>

  <div class="content">

    <h1>{{ slides[currentSlide].title }}</h1>

    <p>{{ slides[currentSlide].description }}</p>

    <button (click)="callNow()">
      {{ slides[currentSlide].button }}
    </button>

  </div>

</section>
