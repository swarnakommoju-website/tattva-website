<header class="header">
  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="/images/logo.png" alt="Tattva Global Logo">
    </div>

    <!-- Navigation -->
    <nav class="menu">

      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Home
      </a>

      <!-- Services Dropdown -->
      <div class="dropdown">

        <a routerLink="/services" routerLinkActive="active">
          Services
          <span class="arrow">▼</span>
        </a>

        <div class="dropdown-content">

          <a routerLink="/job-training">Job Training</a>

          <a routerLink="/job-assistance">Job Assistance</a>

          <a routerLink="/consulting">Consulting</a>

          <a routerLink="/technology-consulting">
            Technology Consulting
          </a>

          <a routerLink="/industry-specific">
            Industry Specific
          </a>

          <a routerLink="/it-solutions">
            IT Solutions
          </a>

        </div>

      </div>

      <a routerLink="/about" routerLinkActive="active">
        About Us
      </a>

      <a routerLink="/contact" routerLinkActive="active">
        Contact
      </a>

    </nav>

    <button class="btn">
      Book Consultation
    </button>

  </div>
</header>
